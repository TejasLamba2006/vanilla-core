name: SMP Watchdog
main: com.tejaslamba.vanillacore.VanillaCorePlugin
version: ${project.version}
api-version: ${minecraft.version}
softdepend: [WorldGuard]
commands:
  smp:
    description: SMP Watchdog command
    usage: /smp [menu|reload [all|config|messages|menus|features]|version|enchant|mace|netherite|infiniterestock|ritual|msg|reply|socialspy|togglechat|togglepm|togglementions|block|unblock|blocked|announcements reload]
  ritual:
    description: Start and manage ritual events
    usage: /ritual [start [time] [color]|status|cancel]
  end:
    description: End dimension lock commands
    usage: /end [open|close|status]
  nether:
    description: Nether dimension lock commands
    usage: /nether [open|close|status]
permissions:
  smp.*:
    description: All SMP Watchdog permissions
    default: op
    children:
      smp.admin: true
      smp.reload: true
      smp.version: true
      smp.menu: true
      smp.enchant: true
      smp.mace: true
      smp.mace.reset: true
      smp.dimension.end: true
      smp.dimension.nether: true
      smp.dimension.bypass: true
      smp.dimension.bypass.end: true
      smp.dimension.bypass.nether: true
      smp.netherite: true
      smp.infiniterestock: true
      smp.ritual: true
      smp.ritual.cancel: true
      smp.enderchestlimiter.bypass: true
      smp.itemlimiter.bypass: true
      smp.netherite.craft.*: true
      smp.msg: true
      smp.reply: true
      smp.socialspy: true
      smp.toggle.chat: true
      smp.toggle.pm: true
      smp.toggle.mentions: true
      smp.block: true
      smp.unblock: true
      smp.blocklist: true
      smp.announcements: true
  smp.admin:
    description: Full access to all SMP Watchdog features and GUI
    default: op
    children:
      smp.reload: true
      smp.version: true
      smp.menu: true
      smp.enchant: true
      smp.mace: true
      smp.mace.reset: true
      smp.dimension.end: true
      smp.dimension.nether: true
      smp.dimension.bypass: true
      smp.netherite: true
      smp.infiniterestock: true
      smp.ritual: true
      smp.ritual.cancel: true
      smp.enderchestlimiter.bypass: true
      smp.itemlimiter.bypass: true
      smp.netherite.craft.*: true
      smp.msg: true
      smp.reply: true
      smp.socialspy: true
      smp.toggle.chat: true
      smp.toggle.pm: true
      smp.toggle.mentions: true
      smp.block: true
      smp.unblock: true
      smp.blocklist: true
      smp.announcements: true
  smp.reload:
    description: Reload plugin configuration
    default: op
  smp.version:
    description: View plugin version
    default: op
  smp.menu:
    description: Open settings menu
    default: op
  smp.enchant:
    description: Manage enchantment limits
    default: op
  smp.mace:
    description: Use mace commands
    default: op
  smp.mace.reset:
    description: Reset mace limiter
    default: op
  smp.dimension.end:
    description: Manage end dimension lock
    default: op
  smp.dimension.nether:
    description: Manage nether dimension lock
    default: op
  smp.dimension.bypass:
    description: Bypass all dimension locks
    default: op
  smp.dimension.bypass.end:
    description: Bypass end dimension lock
    default: false
  smp.dimension.bypass.nether:
    description: Bypass nether dimension lock
    default: false
  smp.netherite:
    description: Manage netherite disabler
    default: op
  smp.infiniterestock:
    description: Manage Infinite Restock feature and open GUI
    default: op
  smp.ritual:
    description: Start and view ritual events
    default: op
  smp.ritual.cancel:
    description: Cancel active ritual events
    default: op
  smp.enderchestlimiter.bypass:
    description: Bypass Ender Chest Item Limiter restrictions
    default: op
  smp.itemlimiter.bypass:
    description: Bypass Item Limiter restrictions
    default: op
  smp.netherite.craft.*:
    description: Bypass netherite crafting restrictions
    default: false
  smp.msg:
    description: Send private messages
    default: op
  smp.reply:
    description: Reply to last private message
    default: op
  smp.socialspy:
    description: View private messages between players
    default: op
  smp.toggle.chat:
    description: Toggle own chat visibility
    default: true
  smp.toggle.pm:
    description: Toggle own private messages
    default: true
  smp.toggle.mentions:
    description: Toggle mention notifications
    default: true
  smp.block:
    description: Block players from contacting you
    default: true
  smp.unblock:
    description: Unblock previously blocked players
    default: true
  smp.blocklist:
    description: View blocked players list
    default: true
  smp.announcements:
    description: Manage announcements engine
    default: op
