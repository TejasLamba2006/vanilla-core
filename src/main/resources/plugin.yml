name: VanillaCore
main: com.tejaslamba.vanillacore.VanillaCorePlugin
version: ${project.version}
api-version: ${minecraft.version}
softdepend: [WorldGuard]
commands:
  smp:
    description: Vanilla Core command
    aliases: [vanilla]
    usage: /smp [menu|reload [all|config|messages|menus|features]|version|enchant|mace|netherite|infiniterestock|ritual|msg|reply|socialspy|togglechat|togglepm|togglementions|block|unblock|blocked|announcements reload]
  msg:
    description: Send a private message
    usage: /msg <player> <message>
  reply:
    description: Reply to the last private message
    usage: /reply <message>
  socialspy:
    description: Toggle social spy mode
    usage: /socialspy
  ritual:
    description: Start and manage ritual events
    usage: /ritual [start [time] [color]|status|cancel]
  end:
    description: End dimension lock commands
    usage: /end [open|close|status]
  nether:
    description: Nether dimension lock commands
    usage: /nether [open|close|status]
  tpa:
    description: Request teleport to a player
    usage: /tpa <player>
  tpahere:
    description: Request player teleport to you
    usage: /tpahere <player>
  tpaccept:
    description: Accept teleport request
    usage: /tpaccept
  tpdeny:
    description: Deny teleport request
    usage: /tpdeny
  spawn:
    description: Teleport to spawn
    usage: /spawn
  setspawn:
    description: Set server spawn
    usage: /setspawn
  back:
    description: Teleport to previous location
    usage: /back
  tp:
    description: Direct teleport command
    usage: /tp <player> [target]
  tphere:
    description: Teleport player to you
    usage: /tphere <player>
  home:
    description: Teleport to home or open homes GUI
    usage: /home [name]
  sethome:
    description: Set a home
    usage: /sethome <name>
  delhome:
    description: Delete a home
    usage: /delhome <name>
  homes:
    description: Open homes GUI
    usage: /homes [player]
  warp:
    description: Teleport to warp or open warps GUI
    usage: /warp [name]
  setwarp:
    description: Set a warp
    usage: /setwarp <name>
  delwarp:
    description: Delete a warp
    usage: /delwarp <name>
  warps:
    description: Open warps GUI
    usage: /warps
  kit:
    description: Claim a kit
    usage: /kit <name>
  kits:
    description: List available kits
    usage: /kits
  fly:
    description: Toggle flight
    usage: /fly [player]
  god:
    description: Toggle god mode
    usage: /god [player]
  speed:
    description: Set movement speed
    usage: /speed <1-10> [player]
  repair:
    description: Repair held item or all inventory
    usage: /repair [all]
  giveitem:
    description: Give an item to a player
    usage: /giveitem <player> <material> [amount]
  workbench:
    description: Open crafting table
    usage: /workbench
  anvil:
    description: Open anvil
    usage: /anvil
  ec:
    description: Open ender chest
    usage: /ec [player]
  invsee:
    description: View player inventory
    usage: /invsee <player>
  clearinv:
    description: Clear player inventory
    usage: /clearinv [player]
permissions:
  smp.*:
    description: All Vanilla Core permissions
    default: op
    children:
      smp.admin: true
