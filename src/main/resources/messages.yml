# ============================================
# SMP Watchdog Messages Configuration
# ============================================
# All plugin messages can be customized here.
# Uses MiniMessage format for colors and formatting.
# See: https://docs.advntr.dev/minimessage/format.html
#
# Common tags:
#   <gold>      <gray>      <green>     <red>       <yellow>
#   <aqua>      <white>     <dark_gray> <bold>      <italic>
#   <strikethrough>  <underlined>  <reset>
#   Placeholders like <player>, <enchant> etc. are replaced at runtime.
# ============================================

# General messages
general:
  prefix: "<dark_gray>[<gold>SMP Watchdog<dark_gray>]<reset>"
  reload: "<green>Configuration reloaded."
  no-permission: "<red>You don't have permission to do that!"
  player-only: "<red>This command can only be used by players!"
  remote-disabled: "<red>[SMP Watchdog] <gray><message>"
  maintenance: "<red>[SMP Watchdog] <gray><message>"
  unknown-command: "<red>Unknown subcommand. Usage: /vanilla [menu|reload [module]|version|enchant|mace|netherite|infiniterestock|ritual]"
  cancelled: "<red>Cancelled."
  invalid-number: "<red>Please enter a valid number!"

# Command messages
commands:
  menu:
    no-permission: "<red>You don't have permission to open the settings menu!"
  reload:
    no-permission: "<red>You don't have permission to reload!"
    usage: "<yellow>Usage: /vanilla reload [all|config|messages|menus|features]"
    invalid-module: "<red>Unknown reload module: <module>"
    module-success: "<green>Reloaded <yellow><module><green> in <yellow><time>ms<green>."
    module-failed: "<red>Reload of <yellow><module><red> failed after <yellow><time>ms<red>."
    summary: "<green>Reload complete: <yellow><successful><green> succeeded, <red><failed><green> failed in <yellow><time>ms<green>."
    failed-list: "<red>Failed modules: <yellow><modules>"
  version:
    no-permission: "<red>You don't have permission to view plugin version!"
    current: "<green>SMP Watchdog version: <yellow><version>"
  enchant:
    no-permission: "<red>You don't have permission to use enchant commands!"
  mace:
    no-permission: "<red>You don't have permission to use mace commands!"
  netherite:
    no-permission: "<red>You don't have permission to use netherite commands!"
    player-only-gui: "<red>Only players can open the GUI!"
    invalid-item: "<red>Invalid item! Valid items: sword, axe, pickaxe, shovel, hoe, helmet, chestplate, leggings, boots"
    feature-not-found: "<red>Netherite Disabler feature not found!"
    disabled-item: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <red>Disabled <white>Netherite <item>"
    enabled-item: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <green>Enabled <white>Netherite <item>"
    help:
      title: "<gold><bold>=== Netherite Commands ==="
      gui: "<yellow>/vanilla netherite gui <gray>- Open netherite manager GUI"
      disable: "<yellow>/vanilla netherite disable <item> <gray>- Disable netherite item"
      enable: "<yellow>/vanilla netherite enable <item> <gray>- Enable netherite item"
  infinite-restock:
    no-permission: "<red>You don't have permission to manage Infinite Restock!"
    feature-not-found: "<red>[SMP Watchdog] Infinite Restock feature not found"
  ritual:
    no-permission: "<red>You don't have permission to use ritual commands!"
  mace:
    reset-no-permission: "<red>You don't have permission to reset the mace limiter!"
    must-hold-mace: "<red>You must be holding a Mace!"
    feature-not-found: "<red>Mace Limiter feature not found!"
    reset-success: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <green>Reset mace craft count! Maces can now be crafted again."
    whitelist:
      added: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <green>Whitelisted mace from limiter"
      removed: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <red>Removed mace limiter whitelist from item"
    status:
      title: "<gold><bold>=== Mace Limiter Status ==="
      enabled-yes: "<yellow>Feature Enabled: <green>Yes"
      enabled-no: "<yellow>Feature Enabled: <red>No"
      crafted: "<yellow>Maces Crafted: <green><crafted><yellow>/<green><max>"
      can-craft-yes: "<yellow>Can Craft More: <green>Yes"
      can-craft-no: "<yellow>Can Craft More: <red>No"
    help:
      title: "<gold><bold>=== Mace Commands ==="
      whitelist: "<yellow>/vanilla mace whitelist <gray>- Toggle whitelist on held mace"
      reset: "<yellow>/vanilla mace reset <gray>- Reset mace limiter (admin)"
      status: "<yellow>/vanilla mace status <gray>- Check mace limiter status"
  dimension:
    no-permission: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <red>You don't have permission to use this command!"
    feature-not-found: "<red>Dimension Lock feature not found!"
    current-locked: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <yellow>The <dimension> is currently <red>Locked"
    current-open: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <yellow>The <dimension> is currently <green>Open"
    opened: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <green>The <dimension> has been opened!"
    closed: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <red>The <dimension> has been closed!"
    usage: "<yellow>Usage: /<dimension> <open|close|status>"
    status:
      title: "<yellow><bold>=== <dimension> Status ==="
      access-locked: "<yellow>Access: <red>Locked"
      access-open: "<yellow>Access: <green>Open"
  enchant:
    invalid-enchantment: "<red>Invalid enchantment: <enchant>"
    invalid-number: "<red>Invalid number: <value>"
    invalid-option: "<red>Invalid option! Use: anvil, replacement, or both"
    blocked: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <green>Blocked enchantment: <white><enchant> <gray>(<option>)"
    no-permission: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <red>You don't have permission to use this command!"
    limit:
      usage: "<red>Usage: /vanilla enchant limit <enchant> <maxLevel> [anvil|replacement|both]"
      max-level-min: "<red>Max level must be 0 or greater!"
      set: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <green>Set enchantment limit: <white><enchant> <gray>→ <yellow><maxLevel> <gray>(<option>)"
    unlimit:
      usage: "<red>Usage: /vanilla enchant unlimit <enchant> [anvil|replacement|both]"
      no-anvil: "<red>No anvil limit set for: <enchant>"
      no-replacement: "<red>No replacement limit set for: <enchant>"
      no-limit: "<red>No limit set for: <enchant>"
      removed: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <green>Removed limit for: <white><enchant> <gray>(<option>)"
    block:
      usage: "<red>Usage: /vanilla enchant block <enchant> [anvil|replacement|both]"
    list:
      title: "<gold><bold>=== Enchantment Limits ==="
      spacer: ""
      anvil-title: "<yellow><bold>Anvil Caps:"
      anvil-empty: "  <gray>No anvil caps configured."
      replacement-title: "<yellow><bold>Replacement Caps:"
      replacement-empty: "  <gray>No replacement caps configured."
      entry-blocked: "  <gray>• <white><enchant> <gray>→ <red><bold>BLOCKED"
      entry-limit: "  <gray>• <white><enchant> <gray>→ <yellow><limit>"
    scan:
      replacement-disabled: "<red>Enchantment Replacement feature is not enabled!"
      result: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <green>Scanned <yellow><scanned> <green>items, modified <yellow><modified>"
    whitelist:
      must-hold-item: "<red>You must be holding an item!"
      removed: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <red>Removed enchantment scan whitelist from item"
      added: "<dark_gray>[<gold>SMP Watchdog<dark_gray>] <green>Whitelisted item from enchantment scans"
    help:
      title: "<gold><bold>=== Enchantment Commands ==="
      limit: "<yellow>/vanilla enchant limit <enchant> <maxLevel> [option] <gray>- Set enchantment limit"
      unlimit: "<yellow>/vanilla enchant unlimit <enchant> [option] <gray>- Remove enchantment limit"
      list: "<yellow>/vanilla enchant list <gray>- Show all limits"
      block: "<yellow>/vanilla enchant block <enchant> [option] <gray>- Block enchantment completely"
      unblock: "<yellow>/vanilla enchant unblock <enchant> [option] <gray>- Unblock enchantment"
      scan: "<yellow>/vanilla enchant scan <gray>- Manually scan your inventory"
      whitelist: "<yellow>/vanilla enchant whitelist <gray>- Toggle whitelist on held item"
      options: "<gray>Options: <white>anvil <gray>| <white>replacement <gray>| <white>both <gray>(default)"

