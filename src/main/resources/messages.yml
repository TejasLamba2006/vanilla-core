# ============================================
# Vanilla Core Messages Configuration
# ============================================
# All plugin messages can be customized here.
# Uses MiniMessage format for colors and formatting.
# See: https://docs.advntr.dev/minimessage/format.html
#
# Common tags:
#   <gold>      <gray>      <green>     <red>       <yellow>
#   <aqua>      <white>     <dark_gray> <bold>      <italic>
#   <strikethrough>  <underlined>  <reset>
#   Placeholders like <player>, <enchant> etc. are replaced at runtime.
# ============================================

# General messages
general:
  prefix: "<dark_gray>[<gold>Vanilla Core<dark_gray>]<reset>"
  reload: "<green>Configuration reloaded."
  no-permission: "<red>You don't have permission to do that!"
  player-only: "<red>This command can only be used by players!"
  unknown-command: "<red>Unknown subcommand. Usage: /vanilla [menu|reload|enchant|mace|netherite|infiniterestock|ritual]"
  cancelled: "<red>Cancelled."
  invalid-number: "<red>Please enter a valid number!"

# Command messages
commands:
  menu:
    no-permission: "<red>You don't have permission to open the settings menu!"
  reload:
    no-permission: "<red>You don't have permission to reload!"
    success: "<green>Configuration reloaded."
  enchant:
    no-permission: "<red>You don't have permission to use enchant commands!"
  mace:
    no-permission: "<red>You don't have permission to use mace commands!"
  netherite:
    no-permission: "<red>You don't have permission to use netherite commands!"
  infinite-restock:
    no-permission: "<red>You don't have permission to manage Infinite Restock!"
  ritual:
    no-permission: "<red>You don't have permission to use ritual commands!"

# Feature toggle messages
feature:
  toggled: "<gray>Toggled <feature> to <state>"
  enabled: "<green>Enabled"
  disabled: "<red>Disabled"

# Custom Anvil Caps
anvil-caps:
  enchantments-limited: "<red>Some enchantments were limited!"

# Enchantment Limiter
enchantment-limiter:
  feature-disabled: "<red>Enchantment Limiter is disabled! Enable it first."
  banned: "<red>'<enchant>' is banned!"
  limited: "<red>Max level for '<enchant>' is <limit>"

# Mace Limiter
mace-limiter:
  feature-disabled: "<red>Mace Limiter is disabled! Enable it first."
  craft-limit-reached: "<red>The mace craft limit has been reached!"
  max-maces-set: "<gray>Max maces set to <yellow><count>"
  craft-count-reset: "<gray>Mace craft count reset! Recipes re-enabled."

# Dimension Lock
dimension-lock:
  feature-disabled: "<red>Dimension Lock is disabled! Enable it first."
  end-locked: "<red>The End is currently locked!"
  nether-locked: "<red>The Nether is currently locked!"

# Netherite Disabler
netherite-disabler:
  feature-disabled: "<red>Netherite Disabler is disabled! Enable it first."

# Mob Manager
mob-manager:
  feature-disabled: "<red>Mob Manager is disabled! Enable it first."
  enabled-all: "<gray>Enabled spawning for all mobs!"
  disabled-all: "<gray>Disabled spawning for all mobs!"
  chunk-cleanup-enabled: "<green>Chunk cleanup enabled! Disabled mobs will be removed from chunks."
  chunk-cleanup-disabled: "<gray>Chunk cleanup disabled."
  worldguard-bypass-enabled: "<green>WorldGuard bypass enabled! Mobs in protected regions can spawn."
  worldguard-bypass-disabled: "<gray>WorldGuard bypass disabled."

# Infinite Restock
infinite-restock:
  feature-disabled: "<red>Infinite Restock is disabled! Enable it first."
  enabled: "<gray>Infinite Restock enabled"
  disabled: "<gray>Infinite Restock disabled"

# Item Limiter
item-limiter:
  feature-disabled: "<red>Item Limiter is disabled! Enable it first."
  limit-exceeded: "<red>You have reached the limit of <limit> for this item"
  item-banned: "<gray>Item banned successfully!"
  item-limit-added: "<gray>Item limit added successfully!"
  item-placed-ban: "<gray>Item placed! Click confirm to ban it."
  item-placed-limit: "<gray>Item placed! Now set the limit amount."
  item-removed: "<gray>Item removed."
  limit-removed: "<gray>Item limit removed!"
  banned-item-removed: "<gray>Banned item removed!"
  banned-item-not-found: "<gray>Banned item not found!"
  limit-not-found: "<gray>Item limit not found!"
  limit-set: "<gray>Limit set to: <limit>"
  limit-updated: "<gray>Limit updated to <limit>"
  item-unbanned: "<gray>Item unbanned with limit: <limit>"
  item-remains-banned: "<gray>Item remains banned"
  please-set-item: "<gray>Please set an item first!"
  # Chat input prompts
  input:
    unban-title: "<gold>Unban Item - Set Limit"
    unban-current: "<gray>Current: <red>BANNED (0)"
    unban-prompt: "<green>Enter a limit to unban (1-64000):"
    set-limit-title: "<gold>Set Item Limit"
    set-limit-prompt: "<green>Enter the maximum amount (0-64000):"
    edit-limit-title: "<gold>Edit Limit Amount"
    edit-limit-current: "<gray>Current: <white><limit>"
    edit-limit-prompt: "<green>Enter the new limit amount (0-64000):"
    cancel-hint: "<gray>Type <red>'cancel' <gray>to cancel"
    invalid-range: "<gray>Invalid number! Must be between 0 and 64000"

# Ender Chest Item Limiter
ender-chest-item-limiter:
  feature-disabled: "<red>Ender Chest Item Limiter is disabled! Enable it first."
  gui:
    main:
      title: "&5Ender Chest Item Limiter"
      view-blocked:
        name: "<!italic><green>View Blocked Items"
        lore-1: "<gray>See all items that"
        lore-2: "<gray>cannot be stored in ender chests"
      add-blocked:
        name: "<!italic><aqua>Add Blocked Item"
        lore-1: "<gray>Select an item to block"
        lore-2: "<gray>from ender chests"
    view:
      title: "&5Blocked Ender Chest Items"
      blocked-item:
        label: "<red><bold>BLOCKED IN ENDER CHEST"
        custom-model-data: "<gray>Custom Model Data: <aqua><customModelData>"
        display-name: "<gray>Display Name: <white><displayName>"
        potion-type: "<gray>Potion Type: <light_purple><potionType>"
        remove-hint: "<red>Shift + Left Click <gray>to remove from blocklist"
    add:
      title: "&5Block Ender Chest Item"
      item-slot:
        remove-hint: "<gray>Click to remove"
        empty:
          name: "<!italic><red>Drag Item Here"
          lore-1: "<gray>Place your item here to"
          lore-2: "<gray>block it from ender chests"
      confirm:
        ready:
          name: "<!italic><green>Confirm"
          lore-1: "<gray>Click to block this item"
          lore-2: "<gray>in ender chests"
        incomplete:
          name: "<!italic><red>Incomplete"
          lore-1: "<gray>Set an item first"
    shared:
      back:
        name: "<!italic><red>Back"
        lore-1: "<gray>Return to main menu"
  messages:
    item-blocked: "<gray>Item blocked from ender chests."
    please-set-item: "<gray>Please set an item first!"
    item-selected: "<gray>Item selected."
    item-removed: "<gray>Item removed."
    blocked-item-removed: "<gray>Blocked item removed!"

# Enchantment level input (BaseMenu)
enchant-input:
  prompt: "<gray>Enter the max level for <enchant> (1-10, or 'cancel'):"
  invalid-level: "<red>Invalid level! Must be between 1-10."
  level-set: "<green><enchant> limited to level <level>"

# Minimap Control
minimap-control:
  feature-disabled: "<red>Minimap Control is disabled! Enable it first."
  mode-changed: "<gray>Global mode changed to: <yellow><mode>"
  nether-fair-toggled: "<gray>Nether fair mode: <state>"
  send-on-join-toggled: "<gray>Send on join: <state>"
  send-on-world-change-toggled: "<gray>Send on world change: <state>"
  applied-to-all: "<green>Applied minimap settings to all online players!"
  world-mode-changed: "<gray>World <yellow><world> <gray>mode changed to: <yellow><mode>"
  world-mode-reset: "<gray>World <yellow><world> <gray>now uses global mode."

# Shield Mechanics
shield-mechanics:
  feature-disabled: "<red>Shield Mechanics is disabled! Enable it first."

# Potion Bans
potion-bans:
  feature-disabled: "<red>Potion Bans is disabled! Enable it first."

# Invisible Kills
invisible-kills:
  feature-disabled: "<red>Invisible Kills is disabled! Enable it first."

# Item Explosion Immunity
item-explosion-immunity:
  feature-disabled: "<red>Item Explosion Immunity is disabled! Enable it first."

# One Player Sleep
one-player-sleep:
  feature-disabled: "<red>One Player Sleep is disabled! Enable it first."

# Server Restart
server-restart:
  feature-disabled: "<red>Server Restart is disabled! Enable it first."

# Combat Restrictions
combat-restrictions:
  feature-disabled: "<red>Combat Restrictions is disabled! Enable it first."

# Item Cooldowns
item-cooldowns:
  feature-disabled: "<red>Item Cooldowns is disabled! Enable it first."

# Ritual
ritual:
  feature-disabled: "<red>Ritual is disabled! Enable it first."
  no-item-in-hand: "<red>You must be holding an item to start a ritual."
  already-active: "<red>A ritual is already active."
  invalid-time: "<red>Invalid time format. Use values like 30s, 1m, 2h, 1d, or 1h30m."
  invalid-color: "<red>Invalid color. Use tab-complete after /ritual start [time]."
  no-cancel-permission: "<red>You do not have permission to cancel rituals."
  started-self: "<green>Ritual started."
  started-line1: "<light_purple><player> <gray>has started a ritual at <yellow>(<x>, <y>, <z>) <gray>in"
  started-line2: "<green><world> <gray>for <yellow><item>"
  ended: "<light_purple>The ritual for <yellow><item> <light_purple>has ended!"
  cancelled: "<red>Ritual cancelled by <yellow><player><red>."
  status-active: "<gray>Active ritual: <yellow><item> <gray>by <yellow><player><gray> (<remaining>s left)"
  status-inactive: "<gray>No active ritual right now."
  help-1: "<yellow>/ritual start [time] [color] <gray>- Start ritual with held item"
  help-2: "<yellow>/ritual status <gray>- Show active ritual status"
  help-3: "<yellow>/ritual cancel <gray>- Cancel active ritual"

