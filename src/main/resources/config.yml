# ============================================
# SMP Watchdog Configuration
# ============================================
# A comprehensive SMP plugin for PvP balance,
# custom mechanics, and server management.
# ============================================
#
#
# Full documentation: https://vanillacore.tejaslamba.com/docs
# ============================================

# ============================================
# Plugin Settings
# ============================================
plugin:
  name: "SMP Watchdog"
  prefix: "<dark_gray>[<gold>SMP Watchdog<dark_gray>]<reset>"
  # Enable verbose logging for debugging (shows detailed info in console)
  verbose: false

database:
  enabled: true
  path: "data/watchdog.db"

social:
  announcements:
    enabled: false
    interval-seconds: 300
    messages:
      - "<gold>Welcome to SMP Watchdog powered server."
      - "<yellow>Use /smp for plugin controls."
  lifecycle:
    auto-spawn-on-respawn: false
  spawn:
    world: "world"
    x: 0.5
    y: 64.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0
  chat:
    enabled: true
    default-format: "<gray><name><dark_gray>: <white>{message}"
    groups:
      admin:
        permission: "group.admin"
        format: "<red>[Admin] <white><name><dark_gray>: <white>{message}"
      mod:
        permission: "group.mod"
        format: "<blue>[Mod] <white><name><dark_gray>: <white>{message}"
    mentions:
      enabled: true
      prefix: "@"
      style: "<yellow>{mention}</yellow>"
      sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    url-formatting:
      enabled: true
      style: "<aqua><underlined>{url}</underlined></aqua>"
  pm:
    socialspy-enabled: true
    format-sender: "<gray>[to <yellow>{target}<gray>] <white>{message}"
    format-target: "<gray>[from <yellow>{sender}<gray>] <white>{message}"
  commands:
    msg:
      enabled: true
      cooldown-seconds: 1
    reply:
      enabled: true
      cooldown-seconds: 1
    block:
      enabled: true
      cooldown-seconds: 0
    unblock:
      enabled: true
      cooldown-seconds: 0

# ============================================
# Features
# ============================================
features:
  # ------------------------------------------
  # Enchantment Limiter
  # ------------------------------------------
  # Limits enchantments on items by checking and modifying them
  # when players pick up, craft, or receive items.
  # Supports both vanilla and custom/modded enchantments.
  # Configure via GUI (/smp menu -> Enchantment Limiter -> Right Click)
  enchantment-limiter:
    enabled: false
    # Enchantment limits (key: max_level)
    # Set to 0 to completely ban an enchantment
    # Use -1 or remove from list to allow unlimited
    # Supports custom enchantments using namespace:key format
    # Example: minecraft:sharpness, customenchants:lifesteal
    limits:
      sharpness: 5
      protection: 4
      fire_protection: 4
      blast_protection: 4
      projectile_protection: 4
      feather_falling: 4
      power: 5
      unbreaking: 3

  # ------------------------------------------
  # Mace Limiter
  # ------------------------------------------
  # Limits how many maces can be crafted server-wide.
  # Announces when a mace is crafted.
  mace-limiter:
    enabled: false
    # Maximum number of maces that can be crafted (server-wide)
    max-maces: 1
    # Current count of maces crafted (managed by plugin, don't edit)
    maces-crafted: 0
    # Title announcement settings
    title:
      enabled: true
      title: "<gold>⚔ MACE CRAFTED ⚔"
      # {player} = crafter name, {count} = mace number
      subtitle: "<yellow>{player} <gray>has crafted mace <yellow>#<gold>{count}"
      fade-in: 10 # ticks (20 ticks = 1 second)
      stay: 70 # ticks
      fade-out: 20 # ticks
    # Chat announcement settings
    chat:
      enabled: true
      # {player} = crafter name, {count} = mace number
      message: "<gold>{player} <yellow>has crafted mace #<gold>{count}<yellow>!"
    # Sound played to all players when mace is crafted
    sound:
      enabled: true
      # Sound name (see Bukkit Sound enum)
      sound: "ENTITY_ENDER_DRAGON_GROWL"
      volume: 1.0
      pitch: 1.0

  # ------------------------------------------
  # Dimension Lock - End
  # ------------------------------------------
  # Prevents players from entering The End dimension.
  dimension-lock-end:
    enabled: false
    # Whether the dimension is currently locked
    locked: false
    # Message shown when trying to enter locked dimension
    locked-message: "<red>The End is currently locked!"

  # ------------------------------------------
  # Dimension Lock - Nether
  # ------------------------------------------
  # Prevents players from entering The Nether dimension.
  dimension-lock-nether:
    enabled: false
    # Whether the dimension is currently locked
    locked: false
    # Message shown when trying to enter locked dimension
    locked-message: "<red>The Nether is currently locked!"

  # ------------------------------------------
  # Netherite Disabler
  # ------------------------------------------
  # Prevents players from upgrading diamond items to netherite
  # via the smithing table. This ONLY blocks the crafting/upgrading
  # process - it does NOT remove existing netherite items from
  # player inventories or prevent them from being used.
  #
  # Players with permission: smp.netherite.craft.<item>
  # (e.g., smp.netherite.craft.sword) can bypass the restriction.
  #
  # NOTE: This feature is intentionally limited to smithing table
  # blocking. For complete netherite item removal, use Item Limiter
  # with limit set to 0.
  netherite-disabler:
    enabled: false
    # Which netherite items to block from being crafted
    disabled-items:
      sword: true
      axe: true
      pickaxe: true
      shovel: true
      hoe: true
      helmet: true
      chestplate: true
      leggings: true
      boots: true

  # ------------------------------------------
  # Invisible Kills
  # ------------------------------------------
  # When a player with invisibility potion kills someone,
  # their name is hidden in the death message.
  invisible-kills:
    enabled: false
    # Death message format
    # {victim} = killed player's name
    # Supports MiniMessage format (e.g. <obfuscated> for obfuscated text)
    death-message: "{victim} was killed by <obfuscated>?????????"

  # ------------------------------------------
  # Item Explosion Immunity
  # ------------------------------------------
  # Protects dropped items from being destroyed by explosions.
  # Useful for preventing item loss from TNT, creepers, etc.
  item-explosion-immunity:
    enabled: false

  # ------------------------------------------
  # Infinite Restock
  # ------------------------------------------
  # Villagers will never run out of trades and prices
  # won't increase from demand. Trades reset immediately.
  # Manage settings via GUI with /smp infiniterestock
  infinite-restock:
    enabled: false
    # Maximum trades per villager (0 = unlimited)
    max-trades: 0
    # Remove price penalty (sets demand to 0)
    disable-price-penalty: true
    # Apply to wandering traders as well
    allow-wandering-traders: true
    # Restore original trade limits (for uninstalling)
    uninstall-mode: false
    # Villager professions to exclude (uppercase)
    # Example: ["LIBRARIAN", "CLERIC"]
    villager-blacklist: []

  # ------------------------------------------
  # Item Limiter
  # ------------------------------------------
  # Advanced item limiting system with support for:
  # - Basic material limits
  # - Custom model data matching
  # - Display name matching
  # - Potion type matching
  # Manage limits via GUI with /smp menu -> Item Limiter -> Right Click
  item-limiter:
    enabled: false
    # Whether to notify the player when items are removed
    notify-player: true
    # Message shown when excess items are removed
    # Placeholders: {item} = item name, {amount} = amount removed, {limit} = configured limit
    notify-message: "<red>[SMP Watchdog] <gray>Excess items removed: <yellow>{item} x{amount} <gray>(limit: {limit})"
    # Whether to drop excess items at player's feet (true) or delete them (false)
    drop-excess: true
    # Item limits configuration
    # Simple format: material_name: limit
    # Advanced format with sections for custom items:
    #   custom_key:
    #     material: MATERIAL_NAME
    #     limit: number
    #     customModelData: number (optional)
    #     displayName: "<red>Custom Name" (optional)
    #     potionType: POTION_TYPE (optional, for potions only)
    # Note: Item bans can be done via Item Limiter
    # by setting an item's limit to 0
    limits:
      GOLDEN_APPLE:
        material: GOLDEN_APPLE
        limit: 96
      COBWEB:
        material: COBWEB
        limit: 64
      TOTEM_OF_UNDYING:
        material: TOTEM_OF_UNDYING
        limit: 2
      EXPERIENCE_BOTTLE:
        material: EXPERIENCE_BOTTLE
        limit: 128
      WIND_CHARGE:
        material: WIND_CHARGE
        limit: 64
      BREEZE_ROD:
        material: BREEZE_ROD
        limit: 64
      SPLASH_POTION_STRONG_STRENGTH:
        material: SPLASH_POTION
        limit: 0
        potionType: STRONG_STRENGTH
      SPLASH_POTION_STRONG_SWIFTNESS:
        material: SPLASH_POTION
        limit: 0
        potionType: STRONG_SWIFTNESS

  # ------------------------------------------
  # Ender Chest Item Limiter
  # ------------------------------------------
  # Blocks configured items from being stored in ender chests.
  # Supports custom model data, display name, and potion type matching.
  # Manage blocked items via GUI with /smp menu -> Ender Chest Item Limiter -> Right Click
  ender-chest-item-limiter:
    enabled: false
    # Whether to notify the player when blocked placement is prevented
    notify-player: true
    # Message shown when a blocked item is placed into an ender chest
    # Placeholder: {item} = item name
    notify-message: "<red>[SMP Watchdog] <gray>You cannot put <yellow>{item}<gray> in an ender chest"
    # Blocked items configuration
    # Advanced format:
    #   custom_key:
    #     material: MATERIAL_NAME
    #     customModelData: number (optional)
    #     displayName: "<red>Custom Name" (optional)
    #     potionType: POTION_TYPE (optional, for potions only)
    blocked-items: {}

  # ------------------------------------------
  # One Player Sleep
  # ------------------------------------------
  # Only one player needs to sleep to skip the night.
  # Uses the playersSleepingPercentage gamerule.
  one-player-sleep:
    enabled: false
    # Message broadcast when a player starts sleeping
    # Placeholders: {player} = player name, {displayname} = display name
    # Leave empty to disable
    sleep-message: "<yellow>{player} <gray>is sleeping..."
    # Message broadcast when night is skipped
    # Leave empty to disable
    skip-message: "<green>☀ Good morning!"

  # ------------------------------------------
  # Mob Manager
  # ------------------------------------------
  # Control which mob types can spawn naturally.
  # Use the GUI (/smp menu) to toggle individual mobs.
  # Allowed spawn reasons will bypass mob restrictions.
  # Supports per-world configuration.
  mob-manager:
    enabled: false
    # Per-world disabled mobs configuration
    # Format: worlds.<world_name>.disabled-mobs.<mob_type>: true/false
    worlds: {}
    # Spawn reasons that bypass mob spawning restrictions (even disabled mobs can spawn via these)
    # Available spawn reasons:
    # NATURAL, JOCKEY, SPAWNER, TRIAL_SPAWNER, EGG, SPAWNER_EGG, LIGHTNING,
    # BUILD_SNOWMAN, BUILD_IRONGOLEM, BUILD_WITHER, VILLAGE_DEFENSE, VILLAGE_INVASION,
    # BREEDING, SLIME_SPLIT, REINFORCEMENTS, NETHER_PORTAL, DISPENSE_EGG,
    # INFECTION, CURED, OCELOT_BABY, SILVERFISH_BLOCK, MOUNT, TRAP, ENDER_PEARL,
    # SHOULDER_ENTITY, DROWNED, SHEARED, EXPLOSION, RAID, PATROL, BEEHIVE,
    # PIGLIN_ZOMBIFIED, SPELL, FROZEN, METAMORPHOSIS, DUPLICATION, COMMAND,
    # ENCHANTMENT, POTION_EFFECT, CUSTOM, DEFAULT
    allowed-spawn-reasons:
      - SPAWNER_EGG
      - CUSTOM
      - COMMAND
    # Remove disabled mobs when chunks load (WARNING: Destructive - removes existing mobs!)
    # Useful for cleaning up after enabling mob blocking.
    chunk-cleanup-enabled: false
    # When enabled, mobs in WorldGuard protected regions can spawn even if disabled.
    # Requires WorldGuard plugin to be installed.
    worldguard-bypass: true

  # ------------------------------------------
  # Minimap Control
  # ------------------------------------------
  # Controls Xaero's Minimap/Worldmap features using
  # special tellraw codes that the mod recognizes.
  # Works with Xaero's Minimap only (not JourneyMap/VoxelMap).
  #
  # NOTE: Xaero's uses predefined codes for each mode.
  # You cannot mix-and-match settings (e.g., radar on but cave map off).
  # Use the mode that best fits your server's needs.
  minimap-control:
    enabled: false
    # Global mode for all worlds (unless overridden per-world)
    # DISABLED - Completely disable minimap
    # FAIR - Disable cave map and radar (competitive/fair play)
    # FULL - Allow all minimap features
    global-mode: FAIR
    # When in FAIR mode and player is in Nether, send extra
    # Nether-specific restrictions
    nether-fair-mode: true
    # Send settings when player joins (2 second delay for mod to load)
    send-on-join: true
    # Send settings when player changes world
    send-on-world-change: true
    # Per-world mode overrides (optional)
    # worlds:
    #   world: FAIR
    #   world_nether: DISABLED
    #   world_the_end: FULL
    worlds: {}

  # ------------------------------------------
  # Server Restart
  # ------------------------------------------
  # Schedule automatic server restarts with countdown warnings.
  # Supports daily, weekly, and one-time scheduled restarts.
  # Configure via GUI (/smp menu -> Server Restart -> Right Click)
  server-restart:
    enabled: false
    # Default countdown time in seconds (used for scheduled restarts)
    countdown-time: 60
    # Times (in seconds) when countdown announcements are shown
    # Example: [300, 120, 60, 30, 10, 5, 4, 3, 2, 1] for 5min, 2min, 1min, etc.
    countdown-announcements:
      - 300
      - 120
      - 60
      - 30
      - 10
      - 5
      - 4
      - 3
      - 2
      - 1
    # Notification types: chat, actionbar, bossbar, title
    # Can use multiple types together
    notification-types:
      - chat
      - bossbar
    # BossBar color for countdown (RED, BLUE, GREEN, YELLOW, PURPLE, PINK, WHITE)
    bossbar-color: RED
    # Timezone for scheduled restarts (leave empty for server timezone)
    # Example: America/New_York, Europe/London, Asia/Tokyo
    timezone: ""
    # Enable scheduled automatic restarts
    scheduled-restarts-enabled: false
    # Scheduled restart times - supports multiple formats:
    # - "HH:mm:ss" for daily restarts (e.g., "04:00:00" = 4 AM daily)
    # - "MON HH:mm:ss" for weekly restarts (e.g., "SUN 03:00:00" = Sunday 3 AM)
    # - "yyyy-MM-dd HH:mm:ss" for one-time restarts (e.g., "2024-12-25 06:00:00")
    scheduled-times:
      - "04:00:00"
    # Execute commands before server restart
    execute-pre-commands: true
    # Commands to run before restart (without leading slash)
    pre-restart-commands:
      - "save-all"
    # Sound settings for countdown warnings
    sound:
      enabled: true
      sound: "BLOCK_NOTE_BLOCK_PLING"
      volume: 1.0
      pitch: 1.0
    # Customizable messages (supports MiniMessage format)
    # {time} = seconds remaining, {player} = executor name
    messages:
      countdown-message: "<red>⚠ Server restarting in <yellow>{time} <red>seconds!"
      actionbar-message: "<red>Restarting in {time}s"
      bossbar-message: "<red>Server Restart: {time}s"
      title-message: "<red>⚠ Server Restart"
      subtitle-message: "<yellow>{time} seconds remaining"
      restart-now-message: "<red>⚠ Server restart initiated by {player}!"
      restart-done-message: "<red>⚠ Server is restarting now!"
      cancelled-message: "<green>✔ Server restart has been cancelled."

  # ------------------------------------------
  # Ritual
  # ------------------------------------------
  # Start ritual events using /ritual while holding an item.
  # Shows particles, ritual displays, and a global countdown bar.
  ritual:
    enabled: false
    # Ritual duration in minutes
    duration-minutes: 1
    # Visual radius value (effective particle ring is radius / 2)
    radius: 5
    # Particle color options:
    # BLUE, YELLOW, AQUA, FUCHSIA, LIME, ORANGE,
    # PURPLE, WHITE, BLACK, GRAY, RED, GREEN
    particle-color: BLUE
    # Strike lightning effect at ritual end
    strike-lightning: true
    # Show a vertical beacon-style beam at ritual end
    end-effect-beacon-beam: false
    # Beacon beam duration in seconds
    beacon-beam-duration-seconds: 8
    # Launch a burst of fireworks at ritual end
    end-effect-firework-burst: false
    # Drop a copy of the held ritual item at ritual end
    drop-item-at-end: false
    # Play a sound to all players when ritual starts
    play-start-sound: true
    # Bukkit Sound enum name
    start-sound: "ENTITY_WITHER_SPAWN"

  # ------------------------------------------
  # Breach Swap
  # ------------------------------------------
  # Prevents players from quickly swapping between a Breach-enchanted
  # mace and a sword or axe in their hotbar or by pressing F (swap hands).
  # This closes the "breach swap" exploit used in PvP.
  breach-swap:
    enabled: false
    # Message shown in the action bar when the swap is blocked.
    # Supports MiniMessage format.
    denied-message: "<red>Breach swapping is disabled."

  # ------------------------------------------
  # Shield Mechanics
  # ------------------------------------------
  # Customize shield stun behavior when players are hit while blocking.
  # Mace hitting a blocking player applies a shield cooldown.
  # Axe hitting a blocking player applies a shield cooldown.
  # Configure via GUI (/smp menu -> Shield Mechanics -> Right Click)
  shield-mechanics:
    enabled: false
    mace-stun:
      # Apply shield cooldown when a mace hits a blocking player
      enabled: true
      # Cooldown duration in ticks (20 ticks = 1 second). Vanilla axe = 100 ticks
      duration-ticks: 100
    axe-stun:
      # Apply shield cooldown when an axe hits a blocking player
      enabled: true
      # Cooldown duration in ticks
      duration-ticks: 100

  # ------------------------------------------
  # Potion Bans
  # ------------------------------------------
  # Configure potion bans per effect and tier.
  # Format for each entry in blocked-effects:
  # effect:tier1:tier2
  # Example: strength:true:false
  potion-bans:
    enabled: false
    # Use lowercase effect names (strength, speed, regeneration, etc.)
    blocked-effects: []

  # ------------------------------------------
  # Bed Bombing Ban
  # ------------------------------------------
  # Disable bed explosions in Nether and End.
  bed-bombing-ban:
    enabled: false

  # ------------------------------------------
  # TNT Minecart Ban
  # ------------------------------------------
  # Disable TNT minecart explosion damage and explosions.
  tnt-minecart-ban:
    enabled: false

  # ------------------------------------------
  # Villager Killing Ban
  # ------------------------------------------
  # Prevent players from killing villagers.
  villager-killing-ban:
    enabled: false

  # ------------------------------------------
  # Crystal PvP Ban
  # ------------------------------------------
  # Disable end crystal placement, crystal damage, and crystal explosions.
  crystal-pvp-ban:
    enabled: false

  # ------------------------------------------
  # Anchor Restriction
  # ------------------------------------------
  # Restrict respawn anchor charging outside Nether.
  anchor-restriction:
    enabled: false

  # ------------------------------------------
  # Pearl Restriction
  # ------------------------------------------
  # Disable ender pearl usage and ender pearl teleporting.
  pearl-restriction:
    enabled: false

  # ------------------------------------------
  # Item Cooldowns
  # ------------------------------------------
  # Generic configurable cooldowns by material.
  # Values are in seconds (supports decimals).
  # Configure common values via GUI and add extra materials manually.
  item-cooldowns:
    enabled: false
    cooldowns:
      GOLDEN_APPLE: 0.0
      ENCHANTED_GOLDEN_APPLE: 0.0
      ENDER_PEARL: 0.0
      WIND_CHARGE: 0.5

  # ------------------------------------------
  # Spectator On Death
  # ------------------------------------------
  # Respawns players into spectator mode after death.
  spectator-on-death:
    enabled: false

  # ------------------------------------------
  # Stop Item Despawn
  # ------------------------------------------
  # Prevents items dropped when a player dies from despawning naturally.
  # Items will persist indefinitely until picked up.
  stop-item-despawn:
    enabled: false

  # ------------------------------------------
  # Faster Happy Ghasts
  # ------------------------------------------
  # Increase flying speed for newly spawned happy ghasts.
  faster-happy-ghasts:
    enabled: false
    # Vanilla-like base is around 0.05, Skript-style boosted value is 0.10
    flying-speed: 0.10
# ============================================
